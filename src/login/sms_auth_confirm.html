<!doctype html>
<html lang="ja">
  <head>
    {% assign page_title = '6-2-1 会員情報入力 入力内容確認 SMS 認証画面' %} {% capture head_extra %}
    <link rel="stylesheet" href="../assets/css/member-registration.css" />
    <link rel="stylesheet" href="../assets/css/components.css" />
    {% endcapture %} {% include 'head-login-contents' %}
  </head>
  <body id="pageTop">
    <div class="page" id="registration-page">
      <div class="body-wrapper">
        {% include 'header' %}
        <main class="content" id="main-content" aria-labelledby="sms-auth-heading">
          <div class="l-container">
            <section class="new-signup-input pb-8" aria-labelledby="sms-auth-heading">
              <img src="../assets/images/img/milestone-3.png" alt="step3 承認コード入力" width="749" height="64" class="u-img-center" />
              <h1 class="heading-ttl" id="sms-auth-heading">SMS認証コード入力</h1>

              <form action="https://stg.moratame.net/s/login/sms_auth_complete.php" method="post" id="authform" onsubmit="return false;" aria-label="SMS認証コード入力フォーム">
                <p class="side-text" id="authcode-desc">音声ガイダンスで届いた６桁の認証コードを入力してください</p>
                <div class="error" id="errmsgfil" role="alert" aria-live="assertive"><span id="errmsg">認証コードの形式が異なります。</span></div>

                <!--電話番号（確認表示）-->
                <div class="select-area select-tel">
                  <div class="form-ttl">
                    <h2 class="element-ttl">電話番号</h2>
                  </div>
                  <div class="input-area">
                    <p>xxx-xxxx-xxxx</p>
                  </div>
                </div>
                <!--/電話番号-->

                <!--認証コード-->
                <div class="select-area">
                  <div class="form-ttl">
                    <h2 class="element-ttl" id="label-authcode">認証コード</h2>
                    <span class="required" aria-hidden="true">必須</span>
                  </div>
                  <div class="input-area">
                    <ul class="input-menu tel">
                      <li>
                        <input
                          type="text"
                          class="fs-15"
                          id="authcode"
                          name="authcode"
                          value=""
                          placeholder="認証コード"
                          data-theme="d"
                          maxlength="6"
                          inputmode="numeric"
                          autocomplete="one-time-code"
                          aria-required="true"
                          aria-describedby="authcode-desc errmsgfil"
                        />
                      </li>
                    </ul>
                  </div>
                </div>
                <!--/認証コード-->

                <div class="submit-area">
                  <input
                    type="hidden"
                    name="sms_input_url"
                    value="https://stg.moratame.net/s/login/sms_auth_input.php?url=https%3A%2F%2Fstg.moratame.net%2Fs%2Fcontents%2Fsignup05.php%3FID%3D31bafddd99a113e9eecbf0097e133378"
                    id="smsInputUrl"
                  />
                  <button type="button" rel="external" class="c-button c-button--confirm" onclick="javascript: ajax_auth_confirm();">認証</button>
                  <button type="button" rel="external" class="c-button c-button--correct mt-2" formmethod="get" onclick="javascript: returnInput();">戻る</button>
                </div>
              </form>
            </section>
          </div>
        </main>
        {% include 'footer' %}
      </div>
    </div>
    <script src="../assets/js/smsauthconfirm.js" charset="UTF-8"></script>
    <script type="module" src="../assets/js/main.js"></script>
  </body>
</html>
